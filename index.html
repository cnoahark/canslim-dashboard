<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#131722">
<title>寻龙诀 OS — CANSLIM 量化看板</title>
<script>
// Load ECharts asynchronously - won't block page rendering
var echartsReady = false;
(function loadEcharts(){
  var s = document.createElement('script');
  s.src = 'https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js';
  s.onload = function(){ echartsReady = true; if(window._tryChart) window._tryChart(); };
  s.onerror = function(){
    var s2 = document.createElement('script');
    s2.src = 'https://unpkg.com/echarts@5.5.1/dist/echarts.min.js';
    s2.onload = function(){ echartsReady = true; if(window._tryChart) window._tryChart(); };
    s2.onerror = function(){ if(window._tryChart) window._tryChart(); };
    document.head.appendChild(s2);
  };
  document.head.appendChild(s);
})();
</script>
<style>
:root{--bg:#131722;--pnl:#1E222D;--bd:#2B313F;--tx:#D1D4DC;--tf:#787B86;--ac:#2962FF;--up:#F23645;--dn:#089981;--ql:#F23645;--qi:#2962FF;--qg:#089981;--qw:#FFD700;--hh:48px;--fs:15px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--tx);height:100vh;overflow:hidden;font-size:var(--fs);line-height:1.4}
.hd{height:var(--hh);display:flex;align-items:center;padding:0 12px;border-bottom:1px solid var(--bd);background:var(--pnl);gap:10px;flex-shrink:0;z-index:10}
.lg{display:flex;align-items:center;gap:8px}
.lg .tt{font-size:1.15rem;font-weight:700;color:#fff;letter-spacing:.5px}
.lg .st{font-size:.68rem;color:var(--tf)}
.bdg{background:var(--ac);color:#fff;font-size:.58rem;padding:2px 6px;border-radius:3px;margin-left:3px;font-weight:600}
.vd{width:1px;height:22px;background:var(--bd)}
.sp{flex:1}
.tb{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.03);padding:4px 12px;border-radius:5px;border:1px solid var(--bd)}
.td{width:12px;height:12px;border-radius:50%;box-shadow:0 0 10px currentColor}
.td.g{background:#089981;color:#089981}
.td.y{background:#FFD700;color:#FFD700}
.td.r{background:#F23645;color:#F23645}
.ti{font-size:.78rem;color:var(--tf)}
.bg{display:flex;gap:3px}
.bu{padding:5px 12px;border-radius:4px;border:1px solid var(--bd);background:rgba(255,255,255,0.03);color:var(--tf);cursor:pointer;font-size:.78rem;transition:all .15s;white-space:nowrap;font-weight:500}
.bu:hover{color:#fff;border-color:#666}
.bu.on{color:#fff;border-color:var(--ac);background:rgba(41,98,255,0.12)}
.sa{display:none;background:rgba(255,152,0,0.12);border:1px solid #FF9800;color:#FF9800;padding:3px 10px;border-radius:4px;font-size:.75rem;cursor:pointer;animation:bl 1s infinite;font-weight:600}
@keyframes bl{50%{opacity:.3}}
.sa.s{display:block}
.bc{display:none;color:var(--tf);font-size:.75rem}
.bc.s{display:flex;align-items:center;gap:4px}
.bc span{color:var(--ac);cursor:pointer;font-weight:600}
.ws{display:flex;height:calc(100vh - var(--hh));overflow:hidden}
.lc{flex:1;display:flex;flex-direction:column;min-width:0}
.cw{flex:1;position:relative}
.ql{position:absolute;font-size:1.6rem;font-weight:700;opacity:.15;pointer-events:none;z-index:2;letter-spacing:3px}
.ql.l{top:6%;right:10%;color:var(--ql)}
.ql.i{top:6%;left:10%;color:var(--qi)}
.ql.g{bottom:6%;left:10%;color:var(--qg)}
.ql.w{bottom:6%;right:10%;color:var(--qw)}
.mh{display:none;text-align:center;color:var(--tf);font-size:.7rem;padding:4px;background:rgba(255,255,255,0.02);border-top:1px solid var(--bd)}
.sb{width:440px;min-width:340px;border-left:1px solid var(--bd);display:flex;flex-direction:column;background:var(--pnl);overflow:hidden}
.sh{padding:7px 10px;border-bottom:1px solid var(--bd);flex-shrink:0}
.sh input{width:100%;padding:8px 10px;border-radius:4px;border:1px solid var(--bd);background:var(--bg);color:var(--tx);font-size:.82rem;outline:none}
.sh input:focus{border-color:var(--ac)}
.sl{flex:1;overflow-y:auto}
.si{display:flex;align-items:center;padding:8px 10px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,0.04);gap:8px;position:relative;flex-wrap:wrap;transition:background .1s}
.si:hover{background:rgba(255,255,255,0.04)}
.si.hl{background:rgba(41,98,255,0.08)}
.sr{font-size:.72rem;color:var(--tf);width:26px;text-align:center;flex-shrink:0}
.sn{font-size:.85rem;font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis}
.ff{display:flex;align-items:center;gap:2px;height:22px;flex-shrink:0}
.ffb{width:6px;border-radius:1px;flex-shrink:0;min-height:2px}
.fl{font-size:.62rem;color:var(--tf);flex-shrink:0;width:40px;text-align:center}
.qt{font-size:.6rem;padding:2px 6px;border-radius:3px;color:#fff;white-space:nowrap;flex-shrink:0;font-weight:600}
.qt.l{background:var(--ql)}.qt.i{background:var(--qi)}.qt.g{background:var(--qg)}.qt.w{background:var(--qw)}
.sv{font-size:.78rem;font-weight:700;flex-shrink:0;width:45px;text-align:right}
.sv.l{color:var(--ql)}.sv.i{color:var(--qi)}.sv.g{color:var(--qg)}.sv.w{color:var(--qw)}
.ftag{padding:2px 6px;border-radius:3px;font-size:.62rem;font-weight:600}
.ftag.in{background:rgba(242,54,69,0.15);color:var(--up)}
.ftag.out{background:rgba(8,153,129,0.15);color:var(--dn)}
.ftag.neut{background:rgba(255,255,255,0.05);color:var(--tf)}
/* Stock detail card */
.sdc{background:rgba(255,255,255,0.02);border:1px solid var(--bd);border-radius:6px;padding:10px;margin:4px 8px}
.sdc .sdc-code{font-size:.7rem;color:var(--tf)}
.sdc .sdc-row{display:flex;justify-content:space-between;align-items:center;margin:4px 0;font-size:.8rem}
.sdc .sdc-label{color:var(--tf)}
.sdc .sdc-val{font-weight:700}
.sdc .sdc-val.r{color:var(--up)}
.sdc .sdc-val.g{color:var(--dn)}
.sdc .sdc-val.a{color:#FFD700}
.sdc .sdc-badge{display:inline-block;padding:2px 6px;border-radius:3px;font-size:.65rem;font-weight:600;margin-right:4px}
.sl::-webkit-scrollbar{width:4px}
.sl::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
/* Modal */
.md{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:100;justify-content:center;align-items:center}
.md.s{display:flex}
.mc{background:var(--pnl);border:1px solid var(--bd);border-radius:8px;width:96vw;max-width:1100px;max-height:90vh;display:flex;flex-direction:column;overflow:hidden}
.mc2{max-width:520px}
.mhdr{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--bd);flex-shrink:0}
.mtt{font-size:1.05rem;font-weight:700}
.mx{background:none;border:none;color:var(--tf);font-size:1.5rem;cursor:pointer;padding:0 8px}
.mb{flex:1;overflow:auto}
.kch{width:100%;height:460px}
.ffl{display:flex;align-items:flex-end;gap:12px;height:160px;padding:10px 0}
.ffc{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.ffi{width:100%;border-radius:2px;min-height:3px;transition:height .3s}
.ffv{font-size:.72rem;font-weight:600}
.ffd{font-size:.62rem;color:var(--tf)}
@media(max-width:767px){
.ws{flex-direction:column}.lc{height:50%}.sb{width:100%;min-width:0;height:50%;border-left:none;border-top:1px solid var(--bd)}
.hd{flex-wrap:wrap;height:auto;padding:6px 8px;gap:6px}#qbtns{display:none}.mh{display:block}.mc{max-width:98vw}
}
</style>
</head>
<body>

<header class="hd">
<div class="lg"><svg width="28" height="28" viewBox="0 0 28 28"><rect width="28" height="28" rx="6" fill="#1E222D" stroke="#2B313F" stroke-width="1.5"/><path d="M6 19L11 12L15 15L20 7" stroke="#2962FF" stroke-width="2.5" stroke-linecap="round"/><circle cx="20" cy="7" r="2" fill="#F23645"/></svg><span class="tt">寻龙诀</span><span class="bdg">OS</span><span class="st">Top-Down 量化</span></div>
<div class="vd"></div>
<div class="tb"><div class="td" id="td"></div><span class="ti" id="tx">--</span><span class="ti" id="dt" style="margin-left:6px"></span></div>
<div class="vd"></div>
<div class="bg"><button class="bu on">日线</button><button class="bu">周线</button><button class="bu">月线</button></div>
<span class="sa" id="sa" onclick="showAlerts()">信号</span>
<select id="vs" style="background:var(--pnl);border:1px solid var(--ac);color:var(--ac);padding:4px 8px;border-radius:4px;font-size:.75rem;cursor:pointer;outline:none;font-weight:600" onchange="switchVersion(this.value)">
<option value="classic">CANSLIM Classic</option>
<option value="car_ln">CAR_LN 成长版</option>
<option value="rotation">CANSLIM 轮动版</option>
<option value="fesc">FESC 精选版</option>
</select>
<div class="bc" id="bc">基准:<span onclick="goHome()">上证</span></div>
<div class="sp"></div>
<div class="bg" id="qbtns">
<button class="bu on" data-q="ALL">全部</button><button class="bu" data-q="Lead" style="color:var(--ql)">领先</button><button class="bu" data-q="Improve" style="color:var(--qi)">改善</button><button class="bu" data-q="Lag" style="color:var(--qg)">落后</button><button class="bu" data-q="Weak" style="color:var(--qw)">转弱</button>
</div>
</header>

<div class="ws">
<div class="lc">
<div class="cw" id="cw"><div class="ql i">改善</div><div class="ql l">领先</div><div class="ql g">落后</div><div class="ql w">转弱</div></div>
<div class="mh">双击→K线 | ESC返回 | 上下键导航</div>
</div>
<aside class="sb">
<div class="sh" style="display:flex;gap:2px;flex-shrink:0">
<div class="bg" id="st" style="width:100%;overflow-x:auto">
<button class="bu on" data-tab="sectors">板块RRG</button>
<button class="bu" data-tab="leading">领军板块</button>
<button class="bu" data-tab="strongest">强中强</button>
<button class="bu" data-tab="radar">金点雷达</button>
<button class="bu" data-tab="consensus">共识信号</button>
</div>
</div>
<div class="sh" style="border:none;padding-top:2px"><input type="text" id="sch" placeholder="搜索..." autocomplete="off"></div>
<div class="sl" id="sl"></div>
</aside>
</div>

<!-- K-line Modal -->
<div class="md" id="km">
<div class="mc"><div class="mhdr"><div class="mtt" id="kt">K线</div>
<div style="display:flex;gap:5px;align-items:center">
<div class="bg" id="kp"><button class="bu on" data-kp="day">日</button><button class="bu" data-kp="week">周</button><button class="bu" data-kp="month">月</button></div>
<button class="bu" id="bf" style="color:#CE93D8;border-color:#CE93D8">资金</button>
<button class="bu" id="bp">&larr;</button><button class="bu" id="bn">&rarr;</button>
<button class="mx" onclick="clk()">&times;</button></div></div>
<div class="mb"><div class="kch" id="kc"></div></div></div>
</div>

<!-- Fund Flow Modal -->
<div class="md" id="fm">
<div class="mc mc2"><div class="mhdr"><div class="mtt">资金动向</div><button class="mx" onclick="clf()">&times;</button></div>
<div class="mb" style="padding:16px" id="fb"></div></div>
</div>

<script>
var data=null,chart=null,currentQuad='ALL',hi=-1,drillStack=[],alertList=[],currentTab='sectors',currentVersion='classic';
var kctx=null,kPeriod='day',kcInst=null;

function cls(x,y){if(x>=0&&y>=0)return'Lead';if(x<0&&y>=0)return'Improve';if(x<0&&y<0)return'Lag';return'Weak'}
function qc(q){return{Lead:'#F23645',Improve:'#2962FF',Lag:'#089981',Weak:'#FFD700'}[q]||'#787B86'}
function ql(q){return{Lead:'领先',Improve:'改善',Lag:'落后',Weak:'转弱'}[q]||q}

async function init(){
  try{
    if(typeof INLINE_DATA!=='undefined'){data=INLINE_DATA}
    else{
      try{var d=await fetch('data/dashboard.json').then(function(r){return r.json()});data=d}
      catch(fe){showError('无法加载数据: '+(fe.message||'fetch失败')+' - 请运行 python compute.py');return}
    }
    if(!data||!data.rrg_data){showError('数据格式异常，请运行 python compute.py');return}
    renderAll()
  }catch(e){showError('渲染错误: '+(e.message||e));console.error(e)}
}
function showError(msg){var el=document.getElementById('sl');if(el)el.innerHTML='<div style=\"padding:32px;text-align:center;color:#F23645;font-size:1rem\">ERROR: '+msg+'</div>'}
function renderTraffic(){
  var s=data.market_status,d=document.getElementById('td'),t=document.getElementById('tx'),dt=document.getElementById('dt');
  if(s.light==='green_attack'){d.className='td g';t.textContent='进攻';t.style.color='#089981'}
  else if(s.light==='yellow_defense'){d.className='td y';t.textContent='防御';t.style.color='#FFD700'}
  else{d.className='td r';t.textContent='避险';t.style.color='#F23645'}
  dt.textContent='分布'+s.distribution_days+' 跟进'+s.follow_through_days+' MA50'+(s.ma50_position==='above'?'上':'下');
}
function curData(){return drillStack.length?drillStack[drillStack.length-1].data||[]:data.rrg_data}

function renderChart(){
  var w=document.getElementById('cw');
  if(typeof echarts==='undefined'){
    if(w)w.innerHTML='<div style=\"display:flex;align-items:center;justify-content:center;height:100%;color:#FFD700;font-size:.9rem\">ECharts 加载中...</div>';
    window._tryChart = function(){renderChart();};
    return;
  }
  if(chart)chart.dispose();chart=echarts.init(w,null,{renderer:'canvas'});
  var raw=curData(),filt=currentQuad==='ALL'?raw:raw.filter(function(d){return cls(d.x,d.y)===currentQuad});
  var sd=filt.map(function(d,i){return{value:[d.x,d.y,d.r||20,d.name,d.level1||'',cls(d.x,d.y),d.close||0,i,d.r5||0,d.r10||0,d.r20||0,d.fund_trend||'',(d.fund_flow||[]).join(','),d.angle||0,d.angle_label||'',d.accel||0,d.accel_signal||'',d.pe_ttm||null,d.net_mf||null,d.up_cnt||0,d.down_cnt||0,d.limit_up||0,d.sector_total||0,d.rps_val||50,d.consensus||''],itemStyle:{color:qc(cls(d.x,d.y))},symbolSize:Math.max(d.r||10,8)}});
  chart.setOption({
    backgroundColor:'transparent',grid:{left:65,right:50,top:40,bottom:50},
    xAxis:{type:'value',name:'RS-Ratio',nameLocation:'center',nameGap:30,min:-60,max:60,axisLine:{lineStyle:{color:'#2B313F'}},splitLine:{show:true,lineStyle:{color:'#1E222D',type:'dashed'}},axisLabel:{color:'#787B86',fontSize:11}},
    yAxis:{type:'value',name:'RS-Mtm',nameLocation:'center',nameGap:45,min:-60,max:60,axisLine:{lineStyle:{color:'#2B313F'}},splitLine:{show:true,lineStyle:{color:'#1E222D',type:'dashed'}},axisLabel:{color:'#787B86',fontSize:11}},
    series:[{type:'scatter',data:sd,emphasis:{scale:1.4,label:{show:true,formatter:function(p){return p.value[3]},position:'top',color:'#fff',fontSize:14,fontWeight:'bold'}},label:{show:true,formatter:function(p){return p.value[3].length>5?p.value[3].substring(0,5):p.value[3]},position:'inside',color:'#fff',fontSize:10,fontWeight:'bold'},markLine:{silent:true,symbol:'none',lineStyle:{type:'dashed',color:'#2B313F',width:1},data:[{xAxis:0},{yAxis:0}]}}],
    tooltip:{trigger:'item',backgroundColor:'#1E222D',borderColor:'#2B313F',textStyle:{color:'#D1D4DC',fontSize:14},formatter:function(p){if(!p.value)return'';var d=p.value,q=d[5],ang=d[13]||0,angL=d[14]||'',acc=d[15]||0,accS=d[16]||'',pe=d[17],mf=d[18],up=d[19]||0,dn=d[20]||0,lu=d[21]||0,st=d[22]||0,rpsv=d[23]||50,cons=d[24]||'';
      var accClr=accS==='加速'?'#F23645':accS==='减速'?'#089981':'var(--tf)';
      var consClr=cons==='强烈看多'?'#F23645':cons==='RRG偏多'?'#FFD700':cons==='RPS背离'?'#2962FF':cons==='双弱'?'#089981':'var(--tf)';
      return'<div style="font-size:16px;font-weight:700;margin-bottom:6px">'+d[3]+' <span style="color:var(--tf);font-size:.75rem">'+d[4]+'</span></div>'+
        '<div><span style="color:'+qc(q)+'">'+ql(q)+'</span> | RS:'+d[0].toFixed(1)+' Mtm:'+d[1].toFixed(1)+'</div>'+
        '<div>RPS: <span style="color:#FFD700;font-weight:700">'+rpsv+'</span> | 共识: <span style="color:'+consClr+';font-weight:700">'+cons+'</span></div>'+
        '<div>夹角:'+ang+'&deg; <span style="color:var(--tf);font-size:.75rem">'+angL+'</span> | 动量<span style="color:'+accClr+'">'+accS+'</span></div>'+
        '<div>点位:'+(d[6]?d[6].toFixed(0):'--')+(pe?' | PE:'+pe:'')+'</div>'+
        (mf!==null?'<div style="margin-top:4px">主力资金: <span style="color:'+(mf>=0?'#F23645':'#089981')+';font-weight:700">'+(mf>=0?'+':'')+mf+'亿</span></div>':'')+
        (d[11]?'<div>量比趋势: <span class="ftag '+(d[11].indexOf('入')>=0?'in':d[11].indexOf('出')>=0?'out':'neut')+'">'+d[11]+'</span></div>':'')+
        (st>0?'<div>情绪: <span style="color:#F23645">'+up+'涨</span> : <span style="color:#089981">'+dn+'跌</span>'+(lu>0?' <span style="color:#FFD700">涨停'+lu+'</span>':'')+' <span style="color:var(--tf);font-size:.65rem">(取样'+st+'只)</span></div>':'')+
        '<div style="margin-top:4px;border-top:1px solid var(--bd);padding-top:4px">5d:<span style="color:'+(d[8]>=0?'#F23645':'#089981')+'">'+(d[8]>=0?'+':'')+d[8].toFixed(1)+'%</span> 10d:'+(d[9]>=0?'+':'')+d[9].toFixed(1)+'% 20d:'+(d[10]>=0?'+':'')+d[10].toFixed(1)+'%</div>'}}
  });
  chart.off('click');chart.off('dblclick');
  chart.on('click',function(p){if(p.value){hi=p.value[7];hl(hi);kctx={sector:raw[hi],index:hi}}});
  chart.on('dblclick',function(p){if(p.value){hi=p.value[7];kctx={sector:raw[hi],index:hi};opk(raw[hi])}});
  window.addEventListener('resize',function(){if(chart)chart.resize()});
}

// ─── Multi-Tab Rendering ───
function renderList(){
  var list=document.getElementById('sl');if(!data)return;
  var q=document.getElementById('sch').value.trim().toLowerCase();

  if(currentTab==='sectors'){
    var items=curData();
    if(q)items=items.filter(function(d){return d.name.toLowerCase().indexOf(q)>=0||(d.level1||'').toLowerCase().indexOf(q)>=0});
    if(currentQuad!=='ALL')items=items.filter(function(d){return cls(d.x,d.y)===currentQuad});
    var o={Lead:0,Improve:1,Lag:2,Weak:3};items.sort(function(a,b){var qa=cls(a.x,a.y),qb=cls(b.x,b.y);return o[qa]!==o[qb]?o[qa]-o[qb]:b.x-a.x});
    var maxFF=Math.max(1,items.reduce(function(m,d){return Math.max(m,Math.max.apply(null,(d.fund_flow||[1]).map(Math.abs)))},1));
    list.innerHTML=items.map(function(d,i){var qc_=cls(d.x,d.y),h=i===hi?' hl':'',ff=d.fund_flow||[],ft=d.fund_trend||'';
      var fb=ff.map(function(v,j){var hh=Math.abs(v)*22/maxFF;return'<div class="ffb" style="height:'+Math.max(4,Math.min(hh,22))+'px;background:'+(v>=1?'#F23645':v<=0.7?'#089981':'#555')+'"></div>'}).join('');
      var ang=d.angle||0,pe=d.pe_ttm,peStr=pe?'<span style="font-size:.62rem;color:var(--tf);margin-left:2px">PE'+pe+'</span>':'';
