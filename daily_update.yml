name: Daily Data Refresh + Deploy

on:
  schedule:
    # A股交易日下午 16:30（收盘后）运行
    - cron: '30 8 * * 1-5'
  workflow_dispatch:  # 也可以手动触发

jobs:
  refresh-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install numpy requests

      - name: Run data computation
        run: python compute.py
        env:
          MINITICK_TOKEN: ${{ secrets.MINITICK_TOKEN }}

      - name: Commit updated data
        run: |
          git config user.name "canslim-bot"
          git config user.email "bot@canslim.local"
          git add data/dashboard.json data/snapshot.json
          git diff --staged --quiet || git commit -m "chore: daily data refresh $(date +'%Y-%m-%d %H:%M')"
          git push
